<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChitraGupta | Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        body {
            background-color: #000000;
            color: #f5f5f7;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .task-card, .journal-card, .guide-card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 1.5rem;
            transition: all 0.2s ease;
        }
        .task-card:hover, .journal-card:hover { border-color: #333333; }
        .completed-card { opacity: 0.5; filter: grayscale(1); }

        .custom-check {
            appearance: none; width: 16px; height: 16px;
            border: 1px solid #444; border-radius: 4px;
            cursor: pointer; position: relative; transition: 0.2s;
            background: transparent;
        }
        .custom-check:checked { background: #f5f5f7; border-color: #f5f5f7; }
        .custom-check:checked::after {
            content: '✓'; color: #000; font-size: 10px; font-weight: bold;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .tab-btn { transition: color 0.2s; }
        .active-tab { color: #f5f5f7; border-bottom: 1px solid #f5f5f7; padding-bottom: 6px; }
        .inactive-tab { color: #6e6e73; border-bottom: 1px solid transparent; padding-bottom: 6px; }

        .modal-bg { backdrop-filter: blur(10px); background: rgba(0,0,0,0.8); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 selection:bg-neutral-800 selection:text-white">

    <div id="topNav" class="absolute top-6 right-6 z-50 hidden">
        <button onclick="logout()" class="text-[11px] font-medium tracking-wide text-neutral-500 hover:text-white transition-colors">
            Logout
        </button>
    </div>

    <!-- AUTHENTICATION SCREEN -->
    <div id="authScreen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black">
        <div class="max-w-sm w-full p-8">
            <h2 class="text-2xl font-semibold text-center mb-1">ChitraGupta</h2>
            <p class="text-sm text-neutral-500 text-center mb-8">Sign in to your ledger</p>
            
            <div class="space-y-3">
                <input type="email" id="emailInput" placeholder="Email" class="w-full bg-[#111] border border-[#222] rounded-lg p-3 text-sm text-white outline-none focus:border-[#555] transition-colors">
                <input type="password" id="passwordInput" placeholder="Password (Min 6)" class="w-full bg-[#111] border border-[#222] rounded-lg p-3 text-sm text-white outline-none focus:border-[#555] transition-colors">
                
                <p id="authError" class="text-red-400 text-xs hidden text-center"></p>

                <div class="flex gap-3 pt-2">
                    <button onclick="handleAuth('login')" class="flex-1 bg-white text-black font-medium text-sm py-2.5 rounded-lg hover:bg-neutral-200 transition-all">Log In</button>
                    <button onclick="handleAuth('signup')" class="flex-1 bg-transparent border border-[#333] text-white font-medium text-sm py-2.5 rounded-lg hover:bg-[#111] transition-all">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="appScreen" class="max-w-xl w-full flex-1 space-y-10 hidden mt-10">
        <header class="text-center">
            <h1 class="text-3xl font-semibold tracking-tight">ChitraGupta <span class="text-neutral-500">.</span></h1>
            <p class="text-[11px] text-neutral-500 tracking-widest mt-2 uppercase">Mind & Action Observer</p>
        </header>

        <div id="inputContainer" class="border border-[#222] rounded-2xl bg-[#0a0a0a] transition-all duration-300 focus-within:border-[#444]">
            <textarea id="taskInput" rows="2" class="w-full bg-transparent p-5 text-white outline-none resize-none placeholder-neutral-600 text-base" placeholder="Declare an action or log a thought..."></textarea>
            <div class="flex justify-between items-center px-5 pb-4">
                <button id="micBtn" onclick="toggleMic()" class="text-neutral-500 hover:text-white transition-colors"><i class="fas fa-microphone"></i></button>
                <div class="flex items-center gap-4">
                    <div id="loading" class="hidden text-[10px] font-medium text-neutral-500 animate-pulse uppercase tracking-wider">Processing...</div>
                    <button onclick="sendData()" class="bg-white text-black text-xs font-medium px-5 py-2 rounded-lg hover:bg-neutral-200 transition-colors">Submit</button>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center border-b border-[#222] pb-2">
            <div class="flex gap-6">
                <button onclick="switchView('tasks')" id="tab-tasks" class="tab-btn active-tab text-[11px] uppercase tracking-widest font-medium">Ledger</button>
                <button onclick="switchView('journals')" id="tab-journals" class="tab-btn inactive-tab text-[11px] uppercase tracking-widest font-medium">Journal</button>
                <button onclick="switchView('guide')" id="tab-guide" class="tab-btn inactive-tab text-[11px] uppercase tracking-widest font-medium">Guide</button>
            </div>
        </div>

        <div id="contentArea" class="space-y-4 pb-20"></div>
    </div>

    <!-- EDIT MODAL -->
    <div id="editModal" class="fixed inset-0 z-[100] modal-bg flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-[#111] border border-[#333] rounded-2xl max-w-lg w-[90%] p-6 relative shadow-2xl">
            <h3 class="text-sm font-medium text-neutral-400 uppercase tracking-widest mb-4">Manual Edit</h3>
            <textarea id="editInputText" rows="4" class="w-full bg-[#1a1a1a] border border-[#333] rounded-lg p-3 text-sm text-white outline-none focus:border-[#555] resize-none mb-4"></textarea>
            <div class="flex justify-end gap-3">
                <button onclick="closeEditModal()" class="text-xs text-neutral-400 hover:text-white transition-colors px-3 py-2">Cancel</button>
                <button onclick="saveEdit()" class="bg-white text-black text-xs font-medium px-5 py-2 rounded-lg hover:bg-neutral-200 transition-colors">Save</button>
            </div>
        </div>
    </div>

    <script>
        // 🛑 REPLACE THESE 🛑
        const _supabaseUrl = 'https://jvtnwblfhialxrqfnvqw.supabase.co'; 
        const _supabaseKey = 'sb_publishable_9H4Tg8Yli-DAlB0UZnM0SQ_-16w2gLZ';
        
        const supabaseClient = window.supabase.createClient(_supabaseUrl, _supabaseKey);

        let currentUser = null;
        let currentView = 'tasks';
        let editContext = { type: '', id: '' };

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                showApp();
            } else {
                showAuth();
            }
        };

        async function handleAuth(action) {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const errorText = document.getElementById('authError');
            errorText.classList.add('hidden');

            if (!email || password.length < 6) {
                errorText.innerText = "Valid email and min 6 char password required.";
                errorText.classList.remove('hidden'); return;
            }

            let result = action === 'signup' 
                ? await supabaseClient.auth.signUp({ email, password })
                : await supabaseClient.auth.signInWithPassword({ email, password });

            if (result.error) {
                errorText.innerText = result.error.message;
                errorText.classList.remove('hidden');
            } else {
                currentUser = result.data.user;
                showApp();
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            showAuth();
        }

        function showApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            document.getElementById('topNav').classList.remove('hidden');
            fetchTasks();
        }

        function showAuth() {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('appScreen').classList.add('hidden');
            document.getElementById('topNav').classList.add('hidden');
        }

        function switchView(view) {
            currentView = view;
            ['tasks', 'journals', 'guide'].forEach(v => {
                document.getElementById(`tab-${v}`).className = v === view ? 'tab-btn active-tab text-[11px] uppercase tracking-widest font-medium' : 'tab-btn inactive-tab text-[11px] uppercase tracking-widest font-medium';
            });
            
            if (view === 'tasks') fetchTasks();
            else if (view === 'journals') fetchJournals();
            else renderGuide();
        }

        function getHeaders() {
            return { 'Content-Type': 'application/json', 'user-id': currentUser.id };
        }

        async function sendData() {
            const input = document.getElementById('taskInput');
            const loader = document.getElementById('loading');
            if (!input.value.trim() || !currentUser) return;

            loader.classList.remove('hidden');
            input.disabled = true;

            try {
                const res = await fetch('/api/parse-task', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ user_input: input.value })
                });
                const responseData = await res.json();
                if (res.ok) {
                    input.value = '';
                    responseData.type === 'journal' ? switchView('journals') : switchView('tasks');
                }
            } finally {
                loader.classList.add('hidden');
                input.disabled = false;
            }
        }

        async function updateSubTask(taskId, subIndex, tasksArrayStr) {
            const tasksArray = JSON.parse(decodeURIComponent(tasksArrayStr));
            tasksArray[subIndex].is_completed = !tasksArray[subIndex].is_completed;
            const allDone = tasksArray.every(s => s.is_completed);

            await fetch(`/api/tasks/${taskId}`, {
                method: 'PATCH',
                headers: getHeaders(),
                body: JSON.stringify({ sub_tasks: tasksArray, is_completed: allDone })
            });
            if(currentView === 'tasks') fetchTasks();
        }

        async function deleteTask(id) {
            if(confirm("Delete record?")) {
                await fetch(`/api/tasks/${id}`, { method: 'DELETE', headers: getHeaders() });
                if(currentView === 'tasks') fetchTasks();
            }
        }

        async function deleteJournal(id) {
            if(confirm("Delete record?")) {
                await fetch(`/api/journals/${id}`, { method: 'DELETE', headers: getHeaders() });
                if(currentView === 'journals') fetchJournals();
            }
        }

        // --- EDIT LOGIC ---
        function openEditModal(type, id, currentText) {
            editContext = { type, id };
            document.getElementById('editInputText').value = decodeURIComponent(currentText);
            const modal = document.getElementById('editModal');
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
        }

        function closeEditModal() {
            const modal = document.getElementById('editModal');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        async function saveEdit() {
            const newText = document.getElementById('editInputText').value;
            const url = editContext.type === 'task' ? `/api/tasks/${editContext.id}` : `/api/journals/${editContext.id}`;
            const payload = editContext.type === 'task' ? { task_title: newText } : { summary: newText };
            
            await fetch(url, {
                method: 'PATCH',
                headers: getHeaders(),
                body: JSON.stringify(payload)
            });
            
            closeEditModal();
            if(editContext.type === 'task') fetchTasks();
            else fetchJournals();
        }

        // --- RENDER LOGIC ---
        async function fetchTasks() {
            if(!currentUser) return;
            const res = await fetch('/api/tasks', { headers: getHeaders() });
            const result = await res.json();
            if (result.status === "success" && currentView === 'tasks') renderTasks(result.data);
        }

        function renderTasks(tasks) {
            const area = document.getElementById('contentArea');
            area.innerHTML = '';
            if(!tasks || tasks.length === 0) {
                area.innerHTML = `<div class="text-center py-20 text-neutral-600 text-xs tracking-wider">No active records.</div>`; return;
            }

            tasks.sort((a,b) => (a.is_completed === b.is_completed ? 0 : a.is_completed ? 1 : -1));

            tasks.forEach((task) => {
                const card = document.createElement('div');
                card.className = `task-card group p-5 ${task.is_completed ? 'completed-card' : ''}`;
                const safeSubTasks = encodeURIComponent(JSON.stringify(task.sub_tasks));
                const safeTitle = encodeURIComponent(task.task_title);

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h2 class="text-base font-medium text-neutral-100 pr-4">${task.task_title}</h2>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="openEditModal('task', '${task.id}', '${safeTitle}')" class="text-neutral-500 hover:text-white p-1"><i class="fas fa-pencil-alt text-[12px]"></i></button>
                            <button onclick="deleteTask('${task.id}')" class="text-neutral-500 hover:text-red-400 p-1"><i class="fas fa-trash-alt text-[12px]"></i></button>
                        </div>
                    </div>
                    <div class="space-y-3">
                        ${task.sub_tasks ? task.sub_tasks.map((sub, i) => `
                            <div class="flex items-center gap-3">
                                <input type="checkbox" ${sub.is_completed ? 'checked' : ''} onclick="updateSubTask('${task.id}', ${i}, '${safeSubTasks}')" class="custom-check">
                                <span class="text-[13px] ${sub.is_completed ? 'line-through text-neutral-600' : 'text-neutral-300'}">${sub.title}</span>
                            </div>
                        `).join('') : ''}
                    </div>
                `;
                area.appendChild(card);
            });
        }

        async function fetchJournals() {
            if(!currentUser) return;
            const res = await fetch('/api/journals', { headers: getHeaders() });
            const result = await res.json();
            if (result.status === "success" && currentView === 'journals') renderJournals(result.data);
        }

        function renderJournals(journals) {
            const area = document.getElementById('contentArea');
            area.innerHTML = '';
            
            if(!journals || journals.length === 0) {
                area.innerHTML = `<div class="text-center py-20 text-neutral-600 text-xs tracking-wider">No journal records.</div>`; return;
            }

            // GROUPING BY DATE
            const grouped = journals.reduce((acc, entry) => {
                const dateObj = new Date(entry.created_at);
                const dateKey = dateObj.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
                if (!acc[dateKey]) acc[dateKey] = [];
                acc[dateKey].push(entry);
                return acc;
            }, {});

            Object.keys(grouped).forEach(dateStr => {
                const dateHeader = document.createElement('h3');
                dateHeader.className = "text-[10px] font-semibold text-neutral-500 uppercase tracking-widest mt-8 mb-4 border-b border-[#222] pb-2";
                dateHeader.innerText = dateStr;
                area.appendChild(dateHeader);

                grouped[dateStr].forEach((entry) => {
                    const card = document.createElement('div');
                    card.className = `journal-card group p-5 mb-3`;
                    const safeSummary = encodeURIComponent(entry.summary);
                    const time = new Date(entry.created_at).toLocaleTimeString('en-US', { hour: '2-digit', minute:'2-digit' });

                    card.innerHTML = `
                        <div class="flex justify-between items-start">
                            <p class="text-[13px] text-neutral-200 leading-relaxed font-light pr-4 whitespace-pre-wrap">${entry.summary}</p>
                            <div class="flex flex-col gap-3 opacity-0 group-hover:opacity-100 transition-opacity min-w-[20px]">
                                <button onclick="openEditModal('journal', '${entry.id}', '${safeSummary}')" class="text-neutral-500 hover:text-white"><i class="fas fa-pencil-alt text-[12px]"></i></button>
                                <button onclick="deleteJournal('${entry.id}')" class="text-neutral-500 hover:text-red-400"><i class="fas fa-trash-alt text-[12px]"></i></button>
                            </div>
                        </div>
                        <p class="text-[9px] text-neutral-600 mt-3 tracking-wider">${time}</p>
                    `;
                    area.appendChild(card);
                });
            });
        }

        function renderGuide() {
            const area = document.getElementById('contentArea');
            area.innerHTML = `
                <div class="guide-card p-6 space-y-6 text-sm text-neutral-300 font-light leading-relaxed">
                    <div>
                        <h3 class="text-white font-medium mb-2 text-base">How it works</h3>
                        <p>ChitraGupta acts as your single point of entry. You don't need to categorize inputs—just type or speak naturally.</p>
                    </div>
                    <div>
                        <h3 class="text-white font-medium mb-2 text-base">The Ledger (Tasks)</h3>
                        <p>If your input is actionable (e.g., "Remind me to call the client tomorrow"), the AI breaks it down into sub-tasks and adds it to the Ledger. Use the pencil icon to edit, or checkboxes to clear sub-tasks.</p>
                    </div>
                    <div>
                        <h3 class="text-white font-medium mb-2 text-base">The Journal</h3>
                        <p>If your input is a thought, rant, or reflection (e.g., "I feel burned out from yesterday's meeting"), it is logged chronologically in the Journal. Entries are grouped by day to build your timeline.</p>
                    </div>
                    <div>
                        <h3 class="text-white font-medium mb-2 text-base">Voice Input</h3>
                        <p>Click the microphone icon to dictate your thoughts. The system automatically transcribes and categorizes it.</p>
                    </div>
                </div>
            `;
        }

        function toggleMic() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            const inputContainer = document.getElementById('inputContainer');
            const micIcon = document.querySelector('#micBtn i');

            recognition.lang = 'en-IN';
            recognition.onstart = () => {
                inputContainer.style.borderColor = '#666';
                micIcon.className = "fas fa-circle-notch animate-spin text-white";
            };
            recognition.onresult = (e) => {
                document.getElementById('taskInput').value = e.results[0][0].transcript;
            };
            recognition.onend = () => {
                inputContainer.style.borderColor = '#222';
                micIcon.className = "fas fa-microphone";
            };
            recognition.start();
        }
    </script>
</body>
</html>
