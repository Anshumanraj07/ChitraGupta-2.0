<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChitraGupt 2.0 | Auth & Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase JS Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        body {
            background-color: #000000;
            color: #d4d4d4;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 600px; height: 300px;
            background: radial-gradient(circle, rgba(29, 78, 216, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
            pointer-events: none;
        }

        .task-card, .journal-card {
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid #1a1a1a;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .task-card:hover, .journal-card:hover { border-color: #333; }
        .completed-card { opacity: 0.4; filter: grayscale(1); }

        .custom-check {
            appearance: none; width: 16px; height: 16px;
            border: 1px solid #333; border-radius: 4px;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .custom-check:checked { background: #fff; border-color: #fff; }
        .custom-check:checked::after {
            content: '✓'; color: #000; font-size: 10px;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .tab-btn { transition: all 0.2s; }
        .active-tab { color: #fff; border-bottom: 2px solid #fff; padding-bottom: 4px; }
        .inactive-tab { color: #525252; border-bottom: 2px solid transparent; padding-bottom: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 selection:bg-white selection:text-black relative">

    <div class="bg-glow"></div>

    <!-- AUTHENTICATION SCREEN -->
    <div id="authScreen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black bg-opacity-90 backdrop-blur-sm">
        <div class="max-w-sm w-full p-8 border border-neutral-800 rounded-3xl bg-neutral-950/80 shadow-2xl">
            <h2 class="text-3xl font-extrabold text-white text-center italic mb-2 tracking-tighter">Enter the Ledger.</h2>
            <p class="text-xs text-neutral-500 text-center mb-8 tracking-widest uppercase font-bold">Authenticate your karma</p>
            
            <div class="space-y-4">
                <input type="email" id="emailInput" placeholder="Email Address" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl p-3 text-sm text-white outline-none focus:border-blue-500 transition-colors">
                <input type="password" id="passwordInput" placeholder="Password (Min 6 chars)" class="w-full bg-neutral-900 border border-neutral-800 rounded-xl p-3 text-sm text-white outline-none focus:border-blue-500 transition-colors">
                
                <p id="authError" class="text-rose-500 text-xs hidden text-center"></p>

                <div class="flex gap-4 pt-4">
                    <button onclick="handleAuth('login')" class="flex-1 bg-white text-black font-black text-xs py-3 rounded-xl uppercase tracking-widest hover:bg-gray-200 transition-all">Log In</button>
                    <button onclick="handleAuth('signup')" class="flex-1 border border-neutral-700 text-white font-black text-xs py-3 rounded-xl uppercase tracking-widest hover:border-white transition-all">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN (Hidden by default) -->
    <div id="appScreen" class="max-w-xl w-full flex-1 space-y-12 hidden">
        <header class="text-center mt-10 relative">
            <button onclick="logout()" class="absolute right-0 top-0 text-[10px] uppercase font-bold tracking-widest text-neutral-600 hover:text-rose-500 transition-colors">
                <i class="fas fa-sign-out-alt mr-1"></i> Logout
            </button>
            <h1 class="text-4xl font-extrabold tracking-tighter text-white italic">
                CHITRAGUPT 2.0 <span class="text-blue-600">.</span>
            </h1>
            <p class="text-[10px] text-neutral-500 uppercase tracking-[0.3em] mt-2 font-bold opacity-80">Agentic Karma & Mind Observer</p>
        </header>

        <div id="inputContainer" class="relative border border-neutral-900 rounded-3xl p-2 bg-neutral-950/50 transition-all duration-500">
            <textarea id="taskInput" rows="2" class="w-full bg-transparent p-4 text-neutral-200 outline-none resize-none placeholder-neutral-700 text-lg" placeholder="Declare an action or dump your thoughts..."></textarea>
            <div class="flex justify-between items-center px-4 pb-3">
                <button id="micBtn" onclick="toggleMic()" class="text-neutral-600 hover:text-white transition-colors"><i class="fas fa-microphone text-lg"></i></button>
                <div class="flex items-center gap-4">
                    <div id="loading" class="hidden text-[10px] font-black text-neutral-600 animate-pulse uppercase tracking-widest">Processing...</div>
                    <button onclick="sendData()" class="bg-white text-black text-[11px] font-black px-6 py-2 rounded-full uppercase hover:scale-105 transition-all">Submit</button>
                </div>
            </div>
        </div>

        <div class="flex gap-8 justify-center border-b border-neutral-900 pb-2">
            <button onclick="switchView('tasks')" id="tab-tasks" class="tab-btn active-tab text-xs font-bold tracking-widest uppercase">Action Ledger</button>
            <button onclick="switchView('journals')" id="tab-journals" class="tab-btn inactive-tab text-xs font-bold tracking-widest uppercase">Mental Log</button>
        </div>

        <div id="contentArea" class="space-y-5 pb-20"></div>
    </div>

    <!-- Scripts -->
    <script>
        const _supabaseUrl = 'https://jvtnwblfhialxrqfnvqw.supabase.co'; 
        const _supabaseKey = 'sb_publishable_9H4Tg8Yli-DAlB0UZnM0SQ_-16w2gLZ';
        
        // BUG FIX: Puraana clash hat gaya, ab seedha sahi variable declare kiya hai
        const supabaseClient = window.supabase.createClient(_supabaseUrl, _supabaseKey);

        let currentUser = null;
        let currentView = 'tasks';

        // --- AUTHENTICATION LOGIC ---
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                showApp();
            } else {
                showAuth();
            }
        };

        async function handleAuth(action) {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const errorText = document.getElementById('authError');
            errorText.classList.add('hidden');

            if (!email || !password) {
                errorText.innerText = "Email and password required.";
                errorText.classList.remove('hidden');
                return;
            }

            if (password.length < 6) {
                errorText.innerText = "Password must be at least 6 characters.";
                errorText.classList.remove('hidden');
                return;
            }

            let result;
            if (action === 'signup') {
                result = await supabaseClient.auth.signUp({ email, password });
            } else {
                result = await supabaseClient.auth.signInWithPassword({ email, password });
            }

            if (result.error) {
                errorText.innerText = result.error.message;
                errorText.classList.remove('hidden');
            } else {
                currentUser = result.data.user;
                showApp();
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            showAuth();
        }

        function showApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            document.getElementById('emailInput').value = '';
            document.getElementById('passwordInput').value = '';
            fetchTasks();
        }

        function showAuth() {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('appScreen').classList.add('hidden');
        }

        // --- UI LOGIC ---
        function switchView(view) {
            currentView = view;
            document.getElementById('tab-tasks').className = view === 'tasks' ? 'tab-btn active-tab text-xs font-bold tracking-widest uppercase' : 'tab-btn inactive-tab text-xs font-bold tracking-widest uppercase';
            document.getElementById('tab-journals').className = view === 'journals' ? 'tab-btn active-tab text-xs font-bold tracking-widest uppercase' : 'tab-btn inactive-tab text-xs font-bold tracking-widest uppercase';
            
            if(view === 'tasks') fetchTasks();
            else fetchJournals();
        }

        // --- API CALLS (Now with User ID Header) ---
        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'user-id': currentUser.id 
            };
        }

        async function fetchTasks() {
            if(!currentUser) return;
            try {
                const response = await fetch('/api/tasks', { headers: getHeaders() });
                const result = await response.json();
                if (result.status === "success" && currentView === 'tasks') renderTasks(result.data);
            } catch (e) { console.error(e); }
        }

        async function fetchJournals() {
            if(!currentUser) return;
            try {
                const response = await fetch('/api/journals', { headers: getHeaders() });
                const result = await response.json();
                if (result.status === "success" && currentView === 'journals') renderJournals(result.data);
            } catch (e) { console.error(e); }
        }

        async function sendData() {
            const input = document.getElementById('taskInput');
            const loader = document.getElementById('loading');
            if (!input.value.trim() || !currentUser) return;

            loader.classList.remove('hidden');
            input.disabled = true;

            try {
                const res = await fetch('/api/parse-task', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ user_input: input.value })
                });
                
                const responseData = await res.json();
                
                if (res.ok) {
                    input.value = '';
                    if(responseData.type === 'journal') switchView('journals');
                    else switchView('tasks');
                }
            } finally {
                loader.classList.add('hidden');
                input.disabled = false;
            }
        }

        async function updateSubTask(taskId, subIndex, tasksArrayStr) {
            const tasksArray = JSON.parse(decodeURIComponent(tasksArrayStr));
            tasksArray[subIndex].is_completed = !tasksArray[subIndex].is_completed;
            const allDone = tasksArray.every(s => s.is_completed);

            await fetch(`/api/tasks/${taskId}`, {
                method: 'PATCH',
                headers: getHeaders(),
                body: JSON.stringify({ sub_tasks: tasksArray, is_completed: allDone })
            });
            if(currentView === 'tasks') fetchTasks();
        }

        async function deleteTask(id) {
            if(confirm("Expunge record from the ledger?")) {
                await fetch(`/api/tasks/${id}`, { method: 'DELETE', headers: getHeaders() });
                if(currentView === 'tasks') fetchTasks();
            }
        }

        async function deleteJournal(id) {
            if(confirm("Erase this thought from memory?")) {
                await fetch(`/api/journals/${id}`, { method: 'DELETE', headers: getHeaders() });
                if(currentView === 'journals') fetchJournals();
            }
        }

        // --- RENDER LOGIC ---
        function renderTasks(tasks) {
            const area = document.getElementById('contentArea');
            area.innerHTML = '';
            
            if(!tasks || tasks.length === 0) {
                area.innerHTML = `<div class="text-center py-20 text-neutral-800 text-[10px] uppercase tracking-widest font-bold">No active karma.</div>`;
                return;
            }

            const weight = { "High": 3, "Medium": 2, "Low": 1 };
            tasks.sort((a,b) => (weight[b.priority]||0) - (weight[a.priority]||0));

            tasks.forEach((task) => {
                const isDone = task.is_completed;
                const card = document.createElement('div');
                card.className = `task-card group p-6 rounded-[2rem] ${isDone ? 'completed-card' : ''}`;
                const safeSubTasks = encodeURIComponent(JSON.stringify(task.sub_tasks));

                const originalInputHtml = task.raw_input ? 
                    `<div class="mb-5 bg-neutral-900/40 p-3 rounded-xl border border-neutral-800/50">
                        <p class="text-[11px] text-neutral-400 italic">" ${task.raw_input} "</p>
                    </div>` : '';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div class="space-y-1">
                            <span class="text-[8px] font-black text-neutral-600 uppercase tracking-widest px-2 py-0.5 border border-neutral-900 rounded-full">${task.category || 'TASK'}</span>
                            <h2 class="text-lg font-bold text-neutral-100 tracking-tighter">${task.task_title}</h2>
                        </div>
                        <span class="text-[8px] font-black border border-neutral-800 px-2 py-1 rounded-lg ${task.priority === 'High' ? 'text-rose-500 border-rose-900/30' : 'text-neutral-500'}">${task.priority}</span>
                    </div>
                    ${originalInputHtml}
                    <div class="space-y-3 mb-6">
                        ${task.sub_tasks ? task.sub_tasks.map((sub, i) => `
                            <div class="flex items-center gap-3">
                                <input type="checkbox" ${sub.is_completed ? 'checked' : ''} onclick="updateSubTask('${task.id}', ${i}, '${safeSubTasks}')" class="custom-check">
                                <span class="text-xs ${sub.is_completed ? 'line-through text-neutral-700' : 'text-neutral-400'}">${sub.title}</span>
                            </div>
                        `).join('') : ''}
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t border-neutral-900/50">
                        <p class="text-[9px] text-neutral-600 italic font-medium max-w-[80%]">"${task.chitragupt_wisdom}"</p>
                        <button onclick="deleteTask('${task.id}')" class="opacity-0 group-hover:opacity-100 text-neutral-800 hover:text-rose-600 transition-all">
                            <i class="fas fa-trash-alt text-[10px]"></i>
                        </button>
                    </div>
                `;
                area.appendChild(card);
            });
        }

        function renderJournals(journals) {
            const area = document.getElementById('contentArea');
            area.innerHTML = '';
            
            if(!journals || journals.length === 0) {
                area.innerHTML = `<div class="text-center py-20 text-neutral-800 text-[10px] uppercase tracking-widest font-bold">The mind is empty.</div>`;
                return;
            }

            journals.forEach((entry) => {
                const date = new Date(entry.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
                const card = document.createElement('div');
                card.className = `journal-card group p-6 rounded-[2rem] border-l-2 border-l-blue-900/50`;

                const originalInputHtml = entry.raw_input ? 
                    `<div class="mb-4 bg-neutral-900/40 p-3 rounded-xl border border-neutral-800/50">
                        <p class="text-[11px] text-neutral-400 italic">" ${entry.raw_input} "</p>
                    </div>` : '';

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-[8px] font-black text-blue-500/50 uppercase tracking-widest">${date}</span>
                        <span class="text-[9px] px-2 py-1 rounded bg-neutral-900/50 text-neutral-400 tracking-wider">Mood: ${entry.mood}</span>
                    </div>
                    ${originalInputHtml}
                    <p class="text-sm text-neutral-300 leading-relaxed mb-6 font-light">
                        <span class="text-[10px] font-bold text-neutral-600 uppercase tracking-widest block mb-1">AI Summary</span>
                        ${entry.summary}
                    </p>
                    <div class="flex justify-between items-end pt-4 border-t border-neutral-900/50">
                        <div class="flex-1">
                            <p class="text-[10px] font-bold text-neutral-600 mb-1 uppercase tracking-widest">Observer's Insight</p>
                            <p class="text-xs text-blue-400/80 italic pr-4">"${entry.philosophical_insight}"</p>
                        </div>
                        <button onclick="deleteJournal('${entry.id}')" class="opacity-0 group-hover:opacity-100 text-neutral-800 hover:text-rose-600 transition-all pb-1">
                            <i class="fas fa-trash-alt text-[10px]"></i>
                        </button>
                    </div>
                `;
                area.appendChild(card);
            });
        }

        // --- Voice Input ---
        function toggleMic() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            const inputContainer = document.getElementById('inputContainer');
            const micIcon = document.querySelector('#micBtn i');

            recognition.lang = 'en-IN';
            recognition.onstart = () => {
                inputContainer.style.borderColor = '#ef4444';
                micIcon.className = "fas fa-circle-notch animate-spin text-rose-500";
                document.getElementById('taskInput').placeholder = "Listening directly to your chaos...";
            };
            recognition.onresult = (e) => {
                document.getElementById('taskInput').value = e.results[0][0].transcript;
            };
            recognition.onend = () => {
                inputContainer.style.borderColor = '#1a1a1a';
                micIcon.className = "fas fa-microphone";
                document.getElementById('taskInput').placeholder = "Declare an action or dump your thoughts...";
            };
            recognition.start();
        }
    </script>
</body>
</html>
