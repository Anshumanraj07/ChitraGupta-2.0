<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChitraGupt | Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        body {
            background-color: #000000;
            color: #f5f5f7;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Apple Minimalist Cards */
        .task-card, .journal-card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 1.5rem;
            transition: all 0.2s ease;
        }
        .task-card:hover, .journal-card:hover { border-color: #333333; }
        .completed-card { opacity: 0.5; filter: grayscale(1); }

        .custom-check {
            appearance: none; width: 16px; height: 16px;
            border: 1px solid #444; border-radius: 4px;
            cursor: pointer; position: relative; transition: 0.2s;
            background: transparent;
        }
        .custom-check:checked { background: #f5f5f7; border-color: #f5f5f7; }
        .custom-check:checked::after {
            content: '✓'; color: #000; font-size: 10px; font-weight: bold;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .tab-btn { transition: color 0.2s; }
        .active-tab { color: #f5f5f7; border-bottom: 1px solid #f5f5f7; padding-bottom: 6px; }
        .inactive-tab { color: #6e6e73; border-bottom: 1px solid transparent; padding-bottom: 6px; }

        /* Modal Styles */
        .modal-bg { backdrop-filter: blur(10px); background: rgba(0,0,0,0.8); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6 selection:bg-neutral-800 selection:text-white">

    <!-- Top Right Corner Fix for Logout -->
    <div id="topNav" class="absolute top-6 right-6 z-50 hidden">
        <button onclick="logout()" class="text-[11px] font-medium tracking-wide text-neutral-500 hover:text-white transition-colors">
            Logout
        </button>
    </div>

    <!-- AUTHENTICATION SCREEN -->
    <div id="authScreen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black">
        <div class="max-w-sm w-full p-8">
            <h2 class="text-2xl font-semibold text-center mb-1">ChitraGupt</h2>
            <p class="text-sm text-neutral-500 text-center mb-8">Sign in to your ledger</p>
            
            <div class="space-y-3">
                <input type="email" id="emailInput" placeholder="Email" class="w-full bg-[#111] border border-[#222] rounded-lg p-3 text-sm text-white outline-none focus:border-[#555] transition-colors">
                <input type="password" id="passwordInput" placeholder="Password (Min 6)" class="w-full bg-[#111] border border-[#222] rounded-lg p-3 text-sm text-white outline-none focus:border-[#555] transition-colors">
                
                <p id="authError" class="text-red-400 text-xs hidden text-center"></p>

                <div class="flex gap-3 pt-2">
                    <button onclick="handleAuth('login')" class="flex-1 bg-white text-black font-medium text-sm py-2.5 rounded-lg hover:bg-neutral-200 transition-all">Log In</button>
                    <button onclick="handleAuth('signup')" class="flex-1 bg-transparent border border-[#333] text-white font-medium text-sm py-2.5 rounded-lg hover:bg-[#111] transition-all">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="appScreen" class="max-w-xl w-full flex-1 space-y-10 hidden mt-10">
        <header class="text-center">
            <h1 class="text-3xl font-semibold tracking-tight">ChitraGupt <span class="text-neutral-500">.</span></h1>
            <p class="text-[11px] text-neutral-500 tracking-widest mt-2 uppercase">Mind & Action Observer</p>
        </header>

        <div id="inputContainer" class="border border-[#222] rounded-2xl bg-[#0a0a0a] transition-all duration-300 focus-within:border-[#444]">
            <textarea id="taskInput" rows="2" class="w-full bg-transparent p-5 text-white outline-none resize-none placeholder-neutral-600 text-base" placeholder="What's on your mind?"></textarea>
            <div class="flex justify-between items-center px-5 pb-4">
                <button id="micBtn" onclick="toggleMic()" class="text-neutral-500 hover:text-white transition-colors"><i class="fas fa-microphone"></i></button>
                <div class="flex items-center gap-4">
                    <div id="loading" class="hidden text-[10px] font-medium text-neutral-500 animate-pulse uppercase tracking-wider">Processing...</div>
                    <button onclick="sendData()" class="bg-white text-black text-xs font-medium px-5 py-2 rounded-lg hover:bg-neutral-200 transition-colors">Submit</button>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center border-b border-[#222] pb-2">
            <div class="flex gap-6">
                <button onclick="switchView('tasks')" id="tab-tasks" class="tab-btn active-tab text-[11px] uppercase tracking-widest font-medium">Ledger</button>
                <button onclick="switchView('journals')" id="tab-journals" class="tab-btn inactive-tab text-[11px] uppercase tracking-widest font-medium">Journal</button>
            </div>
            <!-- NEW: Analyze Karma Button -->
            <button onclick="analyzeKarma()" class="text-[10px] uppercase tracking-widest font-medium text-neutral-400 hover:text-white border border-[#333] px-3 py-1 rounded-md transition-colors flex items-center gap-2">
                <i class="fas fa-bolt"></i> Analyze
            </button>
        </div>

        <div id="contentArea" class="space-y-4 pb-20"></div>
    </div>

    <!-- ANALYSIS MODAL -->
    <div id="analysisModal" class="fixed inset-0 z-[100] modal-bg flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-[#111] border border-[#333] rounded-2xl max-w-lg w-[90%] p-8 relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-5 right-5 text-neutral-500 hover:text-white"><i class="fas fa-times"></i></button>
            <h3 class="text-sm font-medium text-neutral-400 uppercase tracking-widest mb-4"><i class="fas fa-chart-line mr-2"></i> Karma Analysis</h3>
            <div id="analysisContent" class="text-sm text-neutral-200 leading-relaxed space-y-4 whitespace-pre-wrap font-light">
                <!-- Data injected here -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // 🛑 YAHAN APNA SUPABASE URL AUR ANON KEY DAAL LENA 🛑
        const _supabaseUrl = 'https://jvtnwblfhialxrqfnvqw.supabase.co'; 
        const _supabaseKey = 'sb_publishable_9H4Tg8Yli-DAlB0UZnM0SQ_-16w2gLZ';
        
        const supabaseClient = window.supabase.createClient(_supabaseUrl, _supabaseKey);

        let currentUser = null;
        let currentView = 'tasks';

        // --- AUTH LOGIC ---
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                currentUser = session.user;
                showApp();
            } else {
                showAuth();
            }
        };

        async function handleAuth(action) {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            const errorText = document.getElementById('authError');
            errorText.classList.add('hidden');

            if (!email || password.length < 6) {
                errorText.innerText = "Valid email and min 6 char password required.";
                errorText.classList.remove('hidden');
                return;
            }

            let result = action === 'signup' 
                ? await supabaseClient.auth.signUp({ email, password })
                : await supabaseClient.auth.signInWithPassword({ email, password });

            if (result.error) {
                errorText.innerText = result.error.message;
                errorText.classList.remove('hidden');
            } else {
                currentUser = result.data.user;
                showApp();
            }
        }

        async function logout() {
            await supabaseClient.auth.signOut();
            currentUser = null;
            showAuth();
        }

        function showApp() {
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
            document.getElementById('topNav').classList.remove('hidden');
            fetchTasks();
        }

        function showAuth() {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('appScreen').classList.add('hidden');
            document.getElementById('topNav').classList.add('hidden');
        }

        function switchView(view) {
            currentView = view;
            document.getElementById('tab-tasks').className = view === 'tasks' ? 'tab-btn active-tab text-[11px] uppercase tracking-widest font-medium' : 'tab-btn inactive-tab text-[11px] uppercase tracking-widest font-medium';
            document.getElementById('tab-journals').className = view === 'journals' ? 'tab-btn active-tab text-[11px] uppercase tracking-widest font-medium' : 'tab-btn inactive-tab text-[11px] uppercase tracking-widest font-medium';
            
            view === 'tasks' ? fetchTasks() : fetchJournals();
        }

        function getHeaders() {
            return { 'Content-Type': 'application/json', 'user-id': currentUser.id };
        }

        async function fetchTasks() {
            if(!currentUser) return;
            try {
                const response = await fetch('/api/tasks', { headers: getHeaders() });
                const result = await response.json();
                if (result.status === "success" && currentView === 'tasks') renderTasks(result.data);
            } catch (e) { console.error(e); }
        }

        async function fetchJournals() {
            if(!currentUser) return;
            try {
                const response = await fetch('/api/journals', { headers: getHeaders() });
                const result = await response.json();
                if (result.status === "success" && currentView === 'journals') renderJournals(result.data);
            } catch (e) { console.error(e); }
        }

        async function sendData() {
            const input = document.getElementById('taskInput');
            const loader = document.getElementById('loading');
            if (!input.value.trim() || !currentUser) return;

            loader.classList.remove('hidden');
            input.disabled = true;

            try {
                const res = await fetch('/api/parse-task', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ user_input: input.value })
                });
                const responseData = await res.json();
                if (res.ok) {
                    input.value = '';
                    responseData.type === 'journal' ? switchView('journals') : switchView('tasks');
                }
            } finally {
                loader.classList.add('hidden');
                input.disabled = false;
            }
        }

        async function updateSubTask(taskId, subIndex, tasksArrayStr) {
            const tasksArray = JSON.parse(decodeURIComponent(tasksArrayStr));
            tasksArray[subIndex].is_completed = !tasksArray[subIndex].is_completed;
            const allDone = tasksArray.every(s => s.is_completed);

            await fetch(`/api/tasks/${taskId}`, {
                method: 'PATCH',
                headers: getHeaders(),
                body: JSON.stringify({ sub_tasks: tasksArray, is_completed: allDone })
            });
            if(currentView === 'tasks') fetchTasks();
        }

        async function deleteTask(id) {
            if(confirm("Delete record?")) {
                await fetch(`/api/tasks/${id}`, { method: 'DELETE', headers: getHeaders() });
                if(currentView === 'tasks') fetchTasks();
            }
        }

        async function deleteJournal(id) {
            if(confirm("Delete record?")) {
                await fetch(`/api/journals/${id}`, { method: 'DELETE', headers: getHeaders() });
                if(currentView === 'journals') fetchJournals();
            }
        }

        // --- NEW: ANALYZE KARMA LOGIC ---
        async function analyzeKarma() {
            const modal = document.getElementById('analysisModal');
            const content = document.getElementById('analysisContent');
            
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
            
            content.innerHTML = '<p class="text-neutral-500 animate-pulse">Reading the ledger...</p>';

            try {
                const res = await fetch('/api/analyze', { headers: getHeaders() });
                const data = await res.json();
                if(res.ok) {
                    content.innerHTML = data.analysis;
                } else {
                    content.innerHTML = '<p class="text-red-400">Failed to generate analysis.</p>';
                }
            } catch (e) {
                content.innerHTML = '<p class="text-red-400">Error connecting to intelligence.</p>';
            }
        }

        function closeModal() {
            const modal = document.getElementById('analysisModal');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // --- RENDER LOGIC ---
        function renderTasks(tasks) {
            const area = document.getElementById('contentArea');
            area.innerHTML = '';
            
            if(!tasks || tasks.length === 0) {
                area.innerHTML = `<div class="text-center py-20 text-neutral-600 text-xs tracking-wider">No active records.</div>`;
                return;
            }

            const weight = { "High": 3, "Medium": 2, "Low": 1 };
            tasks.sort((a,b) => (weight[b.priority]||0) - (weight[a.priority]||0));

            tasks.forEach((task) => {
                const isDone = task.is_completed;
                const card = document.createElement('div');
                card.className = `task-card group p-5 ${isDone ? 'completed-card' : ''}`;
                const safeSubTasks = encodeURIComponent(JSON.stringify(task.sub_tasks));

                const originalInputHtml = task.raw_input ? 
                    `<p class="text-[12px] text-neutral-500 mb-4 font-light">"${task.raw_input}"</p>` : '';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h2 class="text-base font-medium text-neutral-100">${task.task_title}</h2>
                        <span class="text-[9px] font-medium px-2 py-1 rounded-md bg-[#1a1a1a] text-neutral-400 border border-[#2a2a2a]">${task.priority}</span>
                    </div>
                    ${originalInputHtml}
                    <div class="space-y-3 mb-5">
                        ${task.sub_tasks ? task.sub_tasks.map((sub, i) => `
                            <div class="flex items-center gap-3">
                                <input type="checkbox" ${sub.is_completed ? 'checked' : ''} onclick="updateSubTask('${task.id}', ${i}, '${safeSubTasks}')" class="custom-check">
                                <span class="text-[13px] ${sub.is_completed ? 'line-through text-neutral-600' : 'text-neutral-300'}">${sub.title}</span>
                            </div>
                        `).join('') : ''}
                    </div>
                    <div class="flex justify-between items-end pt-3 border-t border-[#222]">
                        <p class="text-[10px] text-neutral-500 font-medium max-w-[85%]">${task.chitragupt_wisdom}</p>
                        <button onclick="deleteTask('${task.id}')" class="opacity-0 group-hover:opacity-100 text-neutral-600 hover:text-red-400 transition-all p-1">
                            <i class="fas fa-trash-alt text-[12px]"></i>
                        </button>
                    </div>
                `;
                area.appendChild(card);
            });
        }

        function renderJournals(journals) {
            const area = document.getElementById('contentArea');
            area.innerHTML = '';
            
            if(!journals || journals.length === 0) {
                area.innerHTML = `<div class="text-center py-20 text-neutral-600 text-xs tracking-wider">No journal records.</div>`;
                return;
            }

            journals.forEach((entry) => {
                const date = new Date(entry.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
                const card = document.createElement('div');
                card.className = `journal-card group p-5`;

                const originalInputHtml = entry.raw_input ? 
                    `<p class="text-[12px] text-neutral-500 mb-4 font-light">"${entry.raw_input}"</p>` : '';

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-medium text-neutral-500 uppercase tracking-wider">${date}</span>
                        <span class="text-[9px] px-2 py-1 rounded-md bg-[#1a1a1a] text-neutral-400 border border-[#2a2a2a]">${entry.mood}</span>
                    </div>
                    ${originalInputHtml}
                    <p class="text-[13px] text-neutral-200 leading-relaxed mb-5 font-light">
                        ${entry.summary}
                    </p>
                    <div class="flex justify-between items-end pt-3 border-t border-[#222]">
                        <div class="flex-1">
                            <p class="text-[10px] font-medium text-neutral-500 mb-1 uppercase tracking-widest">Insight</p>
                            <p class="text-[11px] text-neutral-400 pr-4">${entry.philosophical_insight}</p>
                        </div>
                        <button onclick="deleteJournal('${entry.id}')" class="opacity-0 group-hover:opacity-100 text-neutral-600 hover:text-red-400 transition-all p-1">
                            <i class="fas fa-trash-alt text-[12px]"></i>
                        </button>
                    </div>
                `;
                area.appendChild(card);
            });
        }

        function toggleMic() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            const inputContainer = document.getElementById('inputContainer');
            const micIcon = document.querySelector('#micBtn i');

            recognition.lang = 'en-IN';
            recognition.onstart = () => {
                inputContainer.style.borderColor = '#666';
                micIcon.className = "fas fa-circle-notch animate-spin text-white";
            };
            recognition.onresult = (e) => {
                document.getElementById('taskInput').value = e.results[0][0].transcript;
            };
            recognition.onend = () => {
                inputContainer.style.borderColor = '#222';
                micIcon.className = "fas fa-microphone";
            };
            recognition.start();
        }
    </script>
</body>
</html>
